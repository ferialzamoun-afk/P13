name: Aikido Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  aikido-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Aikido CI API Client
        run: npm install --global @aikidosec/ci-api-client

      - name: Run Aikido release-gated scan
        run: >
          aikido-api-client scan-release
          ${{ github.event.repository.name }} ${{ github.sha }}
          --apikey ${{ secrets.AIKIDO_CLIENT_API_KEY }}
          --fail-on-sast-scan
          --fail-on-iac-scan
          --fail-on-secrets-scan